name: Scrape & Deploy

on:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip scraping and use existing data (if any)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: ${{ !inputs.skip_scrape }}
        run: pnpm --filter scraper exec playwright install chromium --with-deps

      - name: Run scraper
        if: ${{ !inputs.skip_scrape }}
        run: pnpm scrape
        env:
          OUTPUT_DIR: ${{ github.workspace }}/apps/web/public/data
        # Continue even if scraping partially fails — we want whatever jobs we got
        continue-on-error: true

      - name: Check jobs data exists
        run: |
          if [ -f "apps/web/public/data/jobs.json" ]; then
            echo "jobs.json found:"
            wc -l apps/web/public/data/jobs.json
          else
            echo "WARNING: jobs.json not found, creating empty placeholder"
            mkdir -p apps/web/public/data
            echo '{"generatedAt":null,"totalJobs":0,"jobs":[]}' > apps/web/public/data/jobs.json
          fi

      - name: Build web app
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
